{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white dark:bg-gray-800 p-6 rounded-lg shadow-md border border-gray-100 dark:border-gray-700 transition-colors duration-300">
  <h2 class="text-xl font-semibold mb-4 text-gray-900 dark:text-white">{{ t('register_heading') }}</h2>
  
  <form method="post" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">{{ t('username') }}</label>
      <input name="username" 
             class="w-full border p-2 rounded bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white border-gray-300 dark:border-gray-600 focus:ring-2 focus:ring-blue-500 outline-none transition-all" 
             autofocus />
    </div>
    
    <div>
      <label class="block text-sm font-medium text-gray-700 dark:text-gray-300">{{ t('password') }}</label>
      <input name="password" 
             type="password" 
             class="w-full border p-2 rounded bg-gray-50 dark:bg-gray-700 text-gray-900 dark:text-white border-gray-300 dark:border-gray-600 focus:ring-2 focus:ring-blue-500 outline-none transition-all" />
    </div>
    
    <div class="flex items-center justify-between pt-2">
      <button class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-md font-medium transition-colors shadow-sm">
        {{ t('register') }}
      </button>
      <a href="/auth/login" class="text-sm text-gray-600 dark:text-gray-400 hover:text-blue-600 dark:hover:text-blue-400 transition-colors">
        {{ t('back_to_login') }}
      </a>
    </div>
  </form>
</div>
{% endblock %}
