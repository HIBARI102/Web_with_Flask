{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded shadow">
  <h2 class="text-xl font-semibold mb-4">Register</h2>
  <form method="post" class="space-y-4">
    <div>
      <label class="block text-sm font-medium">Username</label>
      <input name="username" class="w-full border p-2 rounded" autofocus />
    </div>
    <div>
      <label class="block text-sm font-medium">Password</label>
      <input name="password" type="password" class="w-full border p-2 rounded" />
    </div>
    <div class="flex items-center justify-between">
      <button class="bg-blue-600 text-white px-4 py-2 rounded">Register</button>
      <a href="/auth/login" class="text-sm text-gray-600">Back to login</a>
    </div>
  </form>
</div>
{% endblock %}
