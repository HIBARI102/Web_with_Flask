{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto bg-white dark:bg-gray-800 p-8 rounded-lg shadow-md border border-gray-100 dark:border-gray-700 transition-colors duration-300">
  <h2 class="text-2xl font-bold text-gray-900 dark:text-white border-b pb-4 dark:border-gray-700">
    {{ t('about_title') }}
  </h2>
  
  <div class="mt-6 text-gray-700 dark:text-gray-300 leading-relaxed space-y-4">
    <p>
      {{ t('about_desc') }}
    </p>
    
    <div class="pt-6 mt-6 border-t dark:border-gray-700">
        <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-200 mb-2">System Version</h3>
        <p class="text-sm text-gray-500 dark:text-gray-400">v1.0.0 Stable</p>
    </div>
  </div>
</div>
{% endblock %}
