{% extends 'base.html' %}

{% block content %}
<div class="bg-white p-6 rounded shadow max-w-2xl">
  <h2 class="text-xl font-semibold">{{ 'Edit Room' if room else 'New Room' }}</h2>
  <form method="post" class="mt-4 space-y-4">
    <div>
      <label class="block text-sm font-medium">Room Number</label>
      <input name="number" value="{{ room.number if room else '' }}" class="w-full border p-2 rounded" />
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium">Floor</label>
        <input name="floor" value="{{ room.floor if room and room.floor is not none else '' }}" class="w-full border p-2 rounded" />
      </div>
      <div>
        <label class="block text-sm font-medium">Type</label>
        <input name="type" value="{{ room.type if room else '' }}" class="w-full border p-2 rounded" />
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium">Notes</label>
      <textarea name="notes" class="w-full border p-2 rounded">{{ room.notes if room else '' }}</textarea>
    </div>

    <div class="flex items-center space-x-2">
      <button class="bg-blue-600 text-white px-4 py-2 rounded">Save</button>
      <a href="/rooms" class="text-gray-600">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
