{% extends 'base.html' %}

{% block content %}
<div class="bg-white dark:bg-gray-800 p-8 rounded-lg shadow-md max-w-2xl mx-auto border border-gray-100 dark:border-gray-700 transition-colors">
  
  <h2 class="text-2xl font-bold text-gray-900 dark:text-white border-b dark:border-gray-700 pb-4">
    {{ t('edit_room') if room else t('new_room') }}
  </h2>

  <form method="post" class="mt-6 space-y-6">
    <div>
      <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">{{ t('room_number') }}</label>
      <input name="number" 
             value="{{ room.number if room else '' }}" 
             class="w-full border p-2.5 rounded bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white border-gray-300 dark:border-gray-600 focus:ring-2 focus:ring-blue-500 outline-none transition-all" 
             placeholder="e.g. 101" required />
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div>
        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">{{ t('floor') }}</label>
        <input name="floor" 
               value="{{ room.floor if room and room.floor is not none else '' }}" 
               class="w-full border p-2.5 rounded bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white border-gray-300 dark:border-gray-600 focus:ring-2 focus:ring-blue-500 outline-none transition-all" />
      </div>
      <div>
        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">{{ t('type') }}</label>
        <input name="type" 
               value="{{ room.type if room else '' }}" 
               class="w-full border p-2.5 rounded bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white border-gray-300 dark:border-gray-600 focus:ring-2 focus:ring-blue-500 outline-none transition-all" 
               placeholder="Standard / Deluxe" />
      </div>
    </div>

    <div>
      <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">{{ t('notes') }}</label>
      <textarea name="notes" 
                rows="4"
                class="w-full border p-2.5 rounded bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-white border-gray-300 dark:border-gray-600 focus:ring-2 focus:ring-blue-500 outline-none transition-all">{{ room.notes if room else '' }}</textarea>
    </div>

    <div class="flex items-center space-x-4 pt-4 border-t dark:border-gray-700">
      <button type="submit" 
              class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-md font-medium shadow-sm transition-colors">
        {{ t('save') }}
      </button>
      <a href="/rooms" 
         class="text-gray-600 dark:text-gray-400 hover:text-gray-800 dark:hover:text-gray-200 font-medium transition-colors">
        {{ t('cancel') }}
      </a>
    </div>
  </form>
</div>
{% endblock %}
