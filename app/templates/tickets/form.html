{% extends 'base.html' %}

{% block content %}
<div class="bg-white p-6 rounded shadow max-w-2xl">
  <h2 class="text-xl font-semibold">{{ 'Edit Ticket' if ticket else 'New Ticket' }}</h2>
  <form method="post" class="mt-4 space-y-4">
    <div>
      <label class="block text-sm font-medium">Title</label>
      <input name="title" value="{{ ticket.title if ticket else '' }}" class="w-full border p-2 rounded" />
    </div>

    <div>
      <label class="block text-sm font-medium">Description</label>
      <textarea name="description" class="w-full border p-2 rounded">{{ ticket.description if ticket else '' }}</textarea>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium">Priority</label>
        <select name="priority" class="w-full border p-2 rounded">
          {% for p in ['Low','Normal','High'] %}
          <option value="{{ p }}" {% if ticket and ticket.priority==p %}selected{% endif %}>{{ p }}</option>
          {% endfor %}
        </select>
      </div>

      <div>
        <label class="block text-sm font-medium">Status</label>
        <select name="status" class="w-full border p-2 rounded">
          {% for s in ['Open','In Progress','Resolved','Closed'] %}
          <option value="{{ s }}" {% if ticket and ticket.status==s %}selected{% endif %}>{{ s }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium">Assign To</label>
      <input name="assigned_to" value="{{ ticket.assigned_to if ticket else '' }}" class="w-full border p-2 rounded" />
    </div>

    <div>
      <label class="block text-sm font-medium">Room</label>
      <select name="room_id" class="w-full border p-2 rounded">
        <option value="">-- Unassigned --</option>
        {% for r in rooms %}
        <option value="{{ r.id }}" {% if ticket and ticket.room_id==r.id %}selected{% endif %}>{{ r.number }}</option>
        {% endfor %}
      </select>
    </div>

    <div class="flex items-center space-x-2">
      <button class="bg-blue-600 text-white px-4 py-2 rounded">Save</button>
      <a href="/tickets" class="text-gray-600">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
